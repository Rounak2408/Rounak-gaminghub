<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - Mini Games Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <h1>Rounak Hub</h1>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
  </div>

  <nav class="navbar" id="main-nav">
    <div class="container nav-container">
      <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <a href="index.html" class="nav-brand">Rounak Hub</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="form-page page-content">
    <div class="form-box">
      <h1>LOGIN</h1>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="form-error" id="form-error"></div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <p class="form-footer">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('form-error');
      errEl.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const data = await apiLogin(email, password);
        setToken(data.token);
        setStoredUser(data.user);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
      }
    });
  </script>
</body>
</html>
